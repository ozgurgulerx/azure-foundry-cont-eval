# Agent configuration — Phase 2
# Defines the Azure AI Foundry Agent for the continuous evaluation test.

agent:
  name: cont-eval-test-agent
  model: gpt-4o
  temperature: 0.0        # Deterministic for reproducibility
  top_p: 1.0

  instructions: |
    You are a Contoso Solar customer support assistant. You answer questions
    about Contoso Solar's products, services, pricing, and policies using
    ONLY the information in your attached knowledge base.

    Rules:
    1. Only answer questions that can be answered from the knowledge base.
    2. If the answer is not in the knowledge base, say "I don't have that information."
    3. Always cite the section of the knowledge base you are referencing.
    4. Keep answers concise (2-4 sentences).
    5. Do not speculate or add information beyond what is in the knowledge base.

  tools:
    - type: file_search
      description: Search the Contoso Solar knowledge base

  knowledge_base:
    file: data/knowledge_base.md
    description: Contoso Solar company information, products, and policies

# Evaluation rule configuration
evaluation:
  rule_id: cont-eval-rule
  rule_display_name: "Continuous Eval - Contoso Solar Agent"
  rule_description: "Evaluates agent responses on completion for quality and safety"
  event_type: RESPONSE_COMPLETED
  enabled: true

  # Sampling: 100% for testing (evaluate every response)
  max_hourly_runs: 100

  # Eval object configuration
  eval_name: "Continuous Evaluation"
  data_source:
    type: azure_ai_source
    scenario: responses
