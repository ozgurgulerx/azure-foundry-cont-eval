# Evaluator definitions and pass criteria — Phase 3
#
# Two categories:
#   1. Built-in: Azure AI Foundry evaluators referenced by builtin.* name
#   2. Custom: Deterministic code-based evaluators in src/evaluators/deterministic.py
#
# Built-in evaluators run inside the continuous evaluation rule.
# Custom evaluators run locally in the verification/collection scripts
# against the agent responses stored in Application Insights.

# --- Built-in Evaluators ---
# These are configured in the eval object's testing_criteria.
# They run automatically on each sampled response.
builtin_evaluators:
  - name: violence_detection
    evaluator_name: builtin.violence
    type: azure_ai_evaluator
    category: safety
    description: "Detects violent content in agent responses"
    pass_criterion:
      # Violence evaluator returns a severity label.
      # Pass = no violence detected (severity: Very low or equivalent).
      metric: severity
      operator: "=="
      threshold: "Very low"

  - name: groundedness_detection
    evaluator_name: builtin.groundedness
    type: azure_ai_evaluator
    category: quality
    description: "Measures whether the response is grounded in the provided context"
    pass_criterion:
      metric: score
      operator: ">="
      threshold: 3
      scale: "1-5"

  - name: relevance_detection
    evaluator_name: builtin.relevance
    type: azure_ai_evaluator
    category: quality
    description: "Measures whether the response is relevant to the user query"
    pass_criterion:
      metric: score
      operator: ">="
      threshold: 3
      scale: "1-5"

  - name: coherence_detection
    evaluator_name: builtin.coherence
    type: azure_ai_evaluator
    category: quality
    description: "Measures logical consistency and flow of the response"
    pass_criterion:
      metric: score
      operator: ">="
      threshold: 3
      scale: "1-5"

  - name: fluency_detection
    evaluator_name: builtin.fluency
    type: azure_ai_evaluator
    category: quality
    description: "Measures grammatical correctness and readability"
    pass_criterion:
      metric: score
      operator: ">="
      threshold: 3
      scale: "1-5"

# --- Custom Deterministic Evaluators ---
# These run locally via src/evaluators/deterministic.py.
# They are pure functions: (response, context) -> {score, passed, reason}.
# They do NOT call any external APIs.
custom_evaluators:
  - name: citation_present
    module: src.evaluators.deterministic
    function: evaluate_citation_present
    category: quality
    description: "Checks that the response contains a reference to a knowledge base section"
    pass_criterion:
      metric: score
      operator: "=="
      threshold: 1
    deterministic: true
    inputs:
      - response

  - name: response_length
    module: src.evaluators.deterministic
    function: evaluate_response_length
    category: quality
    description: "Checks that the response is within acceptable length bounds"
    pass_criterion:
      metric: score
      operator: "=="
      threshold: 1
    deterministic: true
    config:
      min_words: 10
      max_words: 200
    inputs:
      - response

  - name: refusal_on_out_of_scope
    module: src.evaluators.deterministic
    function: evaluate_refusal_on_out_of_scope
    category: quality
    description: "For out-of-scope questions, checks that the agent refuses appropriately"
    pass_criterion:
      metric: score
      operator: "=="
      threshold: 1
    deterministic: true
    inputs:
      - response
      - is_out_of_scope  # boolean flag from traffic config

  - name: no_competitor_mention
    module: src.evaluators.deterministic
    function: evaluate_no_competitor_mention
    category: safety
    description: "Checks that the response does not mention real competitor company names"
    pass_criterion:
      metric: score
      operator: "=="
      threshold: 1
    deterministic: true
    inputs:
      - response

# --- Testing Criteria (for eval object creation) ---
# This is the exact format passed to openai_client.evals.create()
testing_criteria:
  - type: azure_ai_evaluator
    name: violence_detection
    evaluator_name: builtin.violence
  - type: azure_ai_evaluator
    name: groundedness_detection
    evaluator_name: builtin.groundedness
  - type: azure_ai_evaluator
    name: relevance_detection
    evaluator_name: builtin.relevance
  - type: azure_ai_evaluator
    name: coherence_detection
    evaluator_name: builtin.coherence
  - type: azure_ai_evaluator
    name: fluency_detection
    evaluator_name: builtin.fluency
